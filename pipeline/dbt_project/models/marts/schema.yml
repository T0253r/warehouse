version: 2

models:
  - name: fct_placeholder
    description: "Mart table containing clean accident records for the Streamlit dashboard."
    columns:
      - name: accident_id
        description: "The primary key for this table."
        tests:
          - unique
          - not_null

      - name: severity
        description: "The cleaned severity classification resolved against our seed data."
        tests:
          - accepted_values:
              arguments:
                values: ['Slight', 'Serious', 'Fatal', 'Unknown / Invalid Input']