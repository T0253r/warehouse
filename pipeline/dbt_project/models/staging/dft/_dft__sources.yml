          - name: vehicle_location_restricted_lane
            description: New field added with the 2024 data - data collected in or
              converted to the 2024 STATS19 specification
            meta:
              allowed_values:
                0: On main carriageway (not in restricted lane)
                1: Tram or Light rail track
                2: Bus lane or Busway
