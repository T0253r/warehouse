                5: Bus stop or bus shelter
                6: Central crash barrier
                7: Near/Offside crash barrier
                8: Submerged in water
                9: Entered ditch
                10: Other permanent object
                11: Wall or fence
                99: unknown (self reported)
                -1: Data missing or out of range
          - name: first_point_of_impact
            meta:
              allowed_values:
                0: Did not impact
                1: Front
                2: Back
                3: Offside
                4: Nearside
                9: unknown (self reported)
                -1: Data missing or out of range
          - name: vehicle_left_hand_drive
            meta:
              allowed_values:
                1: 'No'
                2: 'Yes'
                9: Unknown
                -1: Data missing or out of range
          - name: journey_purpose_of_driver_historic
            description: data collected in the 2011 STATS19 specification (or earlier)
            meta:
              allowed_values:
                1: Journey as part of work
                2: Commuting to/from work
                3: Taking pupil to/from school
                4: Pupil riding to/from school
                5: Other
                6: Not known
                15: Other/Not known
                -1: Data missing or out of range
          - name: journey_purpose_of_driver
            description: New field added with the 2024 data - data collected in or
