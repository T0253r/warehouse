                5: Cycleway or shared use footway (not part of main carriageway)
                6: Lay-by or hard shoulder
                9: Footway (pavement)
                99: unknown (self reported)
                -1: Data missing or out of range
          - name: junction_location
            meta:
              allowed_values:
