                1: North
                2: North East
                3: East
                4: South East
                5: South
                6: South West
                7: West
                8: North West
                9: unknown (self reported)
                -1: Data missing or out of range
          - name: vehicle_direction_to
            description: both vehicle_direction_from and vehicle_direction_to should
              be 0
            meta:
              allowed_values:
                0: Parked
                1: North
                2: North East
                3: East
                4: South East
                5: South
                6: South West
                7: West
                8: North West
                9: unknown (self reported)
                -1: Data missing or out of range
          - name: vehicle_location_restricted_lane_historic
            description: data collected in the 2011 STATS19 specification (or earlier)
