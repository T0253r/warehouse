version: 2

sources:
  - name: dft
    description: Raw STATS19 open data downloaded from the DfT.
    tables:
      - name: collision
        config:
          external_location: "data/complete_dataset/dft-road-casualty-statistics-collision-1979-latest-published-year.csv"
        columns:
          - name: collision_index
            description: unique value for each collision. The collision_index combines
              the collision_year and collision_ref_no to form a unique ID. It can
              be used to join to Vehicle and Casualty
          - name: collision_year
          - name: collision_ref_no
            description: In year id used by the police to reference a collision. It
              is not unique outside of the year, use collision_index for linking to
              other years
          - name: location_easting_osgr
            description: Null if not known
          - name: location_northing_osgr
            description: Null if not known
          - name: longitude
            description: Null if not known
          - name: latitude
            description: Null if not known
          - name: police_force
            description: category discontinued in 2019
            meta:
              allowed_values:
