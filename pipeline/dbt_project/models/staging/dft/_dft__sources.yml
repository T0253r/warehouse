            meta:
              allowed_values:
                1: Journey as part of work
                2: Commuting to or from work
                6: Not known or not requested
                7: Education and educational escort
                8: Emergency vehicle (blue light) on response
                9: Personal business or leisure
                -1: Data missing or out of range
          - name: sex_of_driver
            meta:
              allowed_values:
                1: Male
                2: Female
                3: Not known
                -1: Data missing or out of range
          - name: age_of_driver
            meta:
              allowed_values:
                -1: Data missing or out of range
          - name: age_band_of_driver
            meta:
              allowed_values:
                1: 0 - 5
                2: 6 - 10
                3: 11 - 15
                4: 16 - 20
                5: 21 - 25
                6: 26 - 35
                7: 36 - 45
                8: 46 - 55
                9: 56 - 65
                10: 66 - 75
                11: Over 75
                -1: Data missing or out of range
          - name: engine_capacity_cc
            meta:
              allowed_values:
                -1: Data missing or out of range
          - name: propulsion_code
            meta:
              allowed_values:
                1: Petrol
                2: Heavy oil
                3: Electric
                4: Steam
                5: Gas
                6: Petrol/Gas (LPG)
                7: Gas/Bi-fuel
                8: Hybrid electric
                9: Gas Diesel
                10: New fuel technology
                11: Fuel cells
                12: Electric diesel
                -1: Undefined
          - name: age_of_vehicle
          - name: generic_make_model
            description: field introduced in 2020
            meta:
              allowed_values:
                -1: Data missing or out of range
          - name: driver_imd_decile
            description: field introduced in 2016
            meta:
              allowed_values:
                1: Most deprived 10%
                2: More deprived 10-20%
                3: More deprived 20-30%
                4: More deprived 30-40%
                5: More deprived 40-50%
                6: Less deprived 40-50%
                7: Less deprived 30-40%
                8: Less deprived 20-30%
                9: Less deprived 10-20%
                10: Least deprived 10%
                -1: Data missing or out of range
          - name: lsoa_of_driver
            description: 'England and Wales only. See Office for National Statistics
