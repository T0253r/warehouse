version: 2

sources:
  - name: dft
    description: Raw STATS19 open data downloaded from the DfT.
    tables:
      - name: collision
        config:
          external_location: "data/complete_dataset/dft-road-casualty-statistics-collision-1979-latest-published-year.csv"
      - name: vehicle
        config:
          external_location: "data/complete_dataset/dft-road-casualty-statistics-vehicle-1979-latest-published-year.csv"
      - name: casualty
        config:
          external_location: >
            {% raw %}
              read_csv(
                'data/complete_dataset/dft-road-casualty-statistics-casualty-1979-latest-published-year.csv',
                types={{
                  'lsoa_of_casualty': 'VARCHAR'
                }}
              )
            {% endraw %}