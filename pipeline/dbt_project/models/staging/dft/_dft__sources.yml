          - name: escooter_flag
            description: field introduced in 2023
            meta:
              allowed_values:
                1: Vehicle was an e-scooter
                0: Vehicle was not an e-scooter
          - name: driver_distance_banding
            description: field introduced in 2023
            meta:
              allowed_values:
                1: Collision occurred within 5km of drivers home postcode
                2: Collision occurred between 5.001 and 10km of drivers home postcode
                3: Collision occurred between 10.001 and 20km of drivers home postcode
                4: Collision occurred between 20.001 and 100km of drivers home postcode
                5: Collision occurred over 100km of drivers home postcode
      - name: casualty
        config:
          external_location: >
            {% raw %}
              read_csv(
                'data/complete_dataset/dft-road-casualty-statistics-casualty-1979-latest-published-year.csv',
                types={{
                  'lsoa_of_casualty': 'VARCHAR'
                }}
              )
            {% endraw %}
        columns:
          - name: collision_index
            description: unique value for each collision. The collision_index combines
              the collision_year and collision_ref_no to form a unique ID. It can
              be used to join to Vehicle and Casualty
          - name: collision_year
          - name: collision_ref_no
            description: In year id used by the police to reference a collision. It
              is not unique outside of the year, use collision_index for linking to
              other years
          - name: vehicle_reference
            description: unique value for each vehicle in a singular accident. Can
              be used to join a Casualty to a vehicle
          - name: casualty_reference
            description: unique value for each casualty in a singular accident (historical
              years may be unique to a singular vehicle in a road accident)
          - name: casualty_class
            meta:
              allowed_values:
                1: Driver or rider
                2: Passenger
                3: Pedestrian
          - name: sex_of_casualty
            meta:
              allowed_values:
                1: Male
                2: Female
                9: unknown (self reported)
                -1: Data missing or out of range
          - name: age_of_casualty
            meta:
              allowed_values:
                -1: Data missing or out of range
          - name: age_band_of_casualty
            meta:
              allowed_values:
                1: 0 - 5
                2: 6 - 10
                3: 11 - 15
                4: 16 - 20
                5: 21 - 25
                6: 26 - 35
                7: 36 - 45
                8: 46 - 55
                9: 56 - 65
                10: 66 - 75
                11: Over 75
                -1: Data missing or out of range
          - name: casualty_severity
            meta:
              allowed_values:
                1: Fatal
                2: Serious
                3: Slight
          - name: enhanced_casualty_severity
            description: category introduced where collected in 2023
            meta:
              allowed_values:
                1: Fatal
                5: Very Serious
                6: Moderately Serious
                7: Less Serious
                3: Slight
                -1: Data missing or out of range
          - name: pedestrian_location
            meta:
              allowed_values:
                0: Not a Pedestrian
                1: Crossing on pedestrian crossing facility
                2: Crossing in zig-zag approach lines
                3: Crossing in zig-zag exit lines
                4: Crossing elsewhere within 50m. of pedestrian crossing
                5: In carriageway, crossing elsewhere
                6: On footway or verge
                7: On refuge, central island or central reservation
                8: In centre of carriageway - not on refuge, island or central reservation
                9: In carriageway, not crossing
                10: Unknown or other
                -1: Data missing or out of range
          - name: pedestrian_movement
            meta:
              allowed_values:
                0: Not a Pedestrian
                1: Crossing from driver's nearside
                2: Crossing from nearside - masked by parked or stationary vehicle
                3: Crossing from driver's offside
                4: Crossing from offside - masked by  parked or stationary vehicle
                5: In carriageway, stationary - not crossing  (standing or playing)
                6: In carriageway, stationary - not crossing  (standing or playing)
                  - masked by parked or stationary vehicle
                7: Walking along in carriageway, facing traffic
                8: Walking along in carriageway, back to traffic
                9: Unknown or other
                -1: Data missing or out of range
          - name: car_passenger
            meta:
              allowed_values:
                0: Not car passenger
                1: Front seat passenger
                2: Rear seat passenger
                9: unknown (self reported)
                -1: Data missing or out of range
          - name: bus_or_coach_passenger
            meta:
              allowed_values:
                0: Not a bus or coach passenger
                1: Boarding
                2: Alighting
                3: Standing passenger
                4: Seated passenger
                9: unknown (self reported)
                -1: Data missing or out of range
          - name: pedestrian_road_maintenance_worker
            description: 2005 specification only
            meta:
              allowed_values:
                0: No / Not applicable
                1: 'Yes'
                2: Not Known
                3: Probable
                -1: Data missing or out of range
          - name: casualty_type
            description: introduced in 1999 specification
            meta:
              allowed_values:
                0: Pedestrian
                1: Cyclist
                2: Motorcycle 50cc and under rider or passenger
                3: Motorcycle 125cc and under rider or passenger
                4: Motorcycle over 125cc and up to 500cc rider or  passenger
                5: Motorcycle over 500cc rider or passenger
                8: Taxi/Private hire car occupant
                9: Car occupant
                10: Minibus (8 - 16 passenger seats) occupant
                11: Bus or coach occupant (17 or more pass seats)
                16: Horse rider
                17: Agricultural vehicle occupant
                18: Tram occupant
                19: Van / Goods vehicle (3.5 tonnes mgw or under) occupant
                20: Goods vehicle (over 3.5t. and under 7.5t.) occupant
                21: Goods vehicle (7.5 tonnes mgw and over) occupant
                22: Mobility scooter rider
                23: Electric motorcycle rider or passenger
                90: Other vehicle occupant
                97: Motorcycle - unknown cc rider or passenger
                98: Goods vehicle (unknown weight) occupant
                99: Unknown vehicle type (self rep only)
                103: Motorcycle - Scooter (1979-1998)
                104: Motorcycle (1979-1998)
                105: Motorcycle - Combination (1979-1998)
                106: Motorcycle over 125cc (1999-2004)
                108: Taxi (excluding private hire cars) (1979-2004)
                109: Car (including private hire cars) (1979-2004)
                110: Minibus/Motor caravan (1979-1998)
                113: Goods over 3.5 tonnes (1979-1998)
                -1: Data missing or out of range
          - name: casualty_imd_decile
            description: field introduced in 2016
            meta:
              allowed_values:
                1: Most deprived 10%
                2: More deprived 10-20%
                3: More deprived 20-30%
                4: More deprived 30-40%
                5: More deprived 40-50%
                6: Less deprived 40-50%
                7: Less deprived 30-40%
                8: Less deprived 20-30%
                9: Less deprived 10-20%
                10: Least deprived 10%
                -1: Data missing or out of range
          - name: lsoa_of_casualty
            description: 'England and Wales only. See Office for National Statistics
              (ONS) guidance: https://www.ons.gov.uk/methodology/geography/ukgeographies/censusgeography'
          - name: casualty_injury_based
            meta:
              allowed_values:
                0: Based on severity reporting
                1: Based on Injury code reporting
          - name: casualty_adjusted_serious
          - name: casualty_adjusted_slight
          - name: casualty_distance_banding
            description: field introduced in 2023
            meta:
              allowed_values:
                1: Collision occurred within 5km of casualties home postcode
                2: Collision occurred between 5.001 and 10km of casualties home postcode
                3: Collision occurred between 10.001 and 20km of casualties home postcode
                4: Collision occurred between 20.001 and 100km of casualties home
                  postcode
                5: Collision occurred over 100km of casualties home postcode
                -1: Data missing or out of range