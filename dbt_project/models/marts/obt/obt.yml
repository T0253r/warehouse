          dimension:
            groups: ["date_info"]

      # Time Info Group
      - name: collision_time
        meta:
          dimension:
            groups: ["time_info"]
      - name: collision_hour
        meta:
          dimension:
            groups: ["time_info"]
      - name: is_rush_hour
        meta:
